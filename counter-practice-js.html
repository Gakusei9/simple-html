<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counter</title>
</head>
<body>
  <div>
    <input type="number" placeholder="number" id="number"/>
    <button id="plus">+</button>
    <button id="minus">-</button>
    <button id="plus5">+5</button>
    <button id="plus10">+10</button>
    <button id="x2">X2</button>
    <button id="/2">/2</button>
    <button id="reset">Reset</button>
    
  </div>
    
    <script>
    
      let plus = document.getElementById("plus");
      let minus = document.getElementById("minus");
      let number = document.getElementById("number");
      let plus5 = document.getElementById("plus5");
      let plus10 = document.getElementById("plus10");
      let multiply = document.getElementById("x2");
      let divide = document.getElementById("/2");
      let reset = document.getElementById("reset");
      let count = 0;
      
      
      plus.onclick = function() {
        count = count + 1;
        number.value = count;
      };
      
      minus.onclick = function() {
        count = count - 1;
        number.value = count;
      };
    
      plus5.onclick = function() {
        count = count + 5;
        number.value = count;
      };
      
      plus10.onclick = function() {
        count = count + 10;
        number.value = count;
      };
      
       multiply.onclick = function() {
        count = count * 2;
        number.value = count;
      };
      
       divide.onclick = function() {
        count = count / 2;
        number.value = count;
      };
      
       reset.onclick = function() {
         count = 0;
        number.value = count;
      };
    </script>
</body>
</html>
